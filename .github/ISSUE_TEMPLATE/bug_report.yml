name: Bug Report
description: Report a bug in att
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: att version
      description: "Output of `att --version`"
      placeholder: "v0.1.0"
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Linux (x86_64)
        - Linux (arm64)
    validations:
      required: true
  - type: input
    id: tmux-version
    attributes:
      label: tmux version
      description: "Output of `tmux -V`"
      placeholder: "tmux 3.4"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Any relevant terminal output
      render: shell
